name: Build White-Label Mobile App

on:
  workflow_dispatch:
    inputs:
      tenant_slug:
        description: 'Tenant slug (e.g., mohyun, catholia)'
        required: true
        type: string
      platform:
        description: 'Target platform'
        required: true
        type: choice
        options:
          - android
          - ios
          - all

env:
  API_BASE: https://syndock.com

jobs:
  build-android:
    name: Build Android (${{ inputs.tenant_slug }})
    runs-on: ubuntu-latest
    if: inputs.platform == 'android' || inputs.platform == 'all'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Fetch tenant config
        id: tenant
        run: |
          CONFIG=$(curl -s "${API_BASE}/api/platform/tenants/${{ inputs.tenant_slug }}" -H "X-Tenant-Id: ${{ inputs.tenant_slug }}")
          NAME=$(echo "$CONFIG" | jq -r '.name // "SynDock Shop"')
          echo "name=${NAME}" >> $GITHUB_OUTPUT

      - name: Build Android APK
        working-directory: mobile
        run: |
          chmod +x scripts/build-tenant-app.sh
          ./scripts/build-tenant-app.sh "${{ inputs.tenant_slug }}" android
        env:
          API_BASE: ${{ env.API_BASE }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.tenant_slug }}-android
          path: mobile/dist/**

  build-ios:
    name: Build iOS (${{ inputs.tenant_slug }})
    runs-on: macos-latest
    if: inputs.platform == 'ios' || inputs.platform == 'all'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Build iOS
        working-directory: mobile
        run: |
          chmod +x scripts/build-tenant-app.sh
          ./scripts/build-tenant-app.sh "${{ inputs.tenant_slug }}" ios
        env:
          API_BASE: ${{ env.API_BASE }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.tenant_slug }}-ios
          path: mobile/dist/**

  notify:
    name: Notify completion
    runs-on: ubuntu-latest
    needs: [build-android, build-ios]
    if: always()

    steps:
      - name: Summary
        run: |
          echo "## White-Label App Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Tenant:** ${{ inputs.tenant_slug }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Platform:** ${{ inputs.platform }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ needs.build-android.result }} / ${{ needs.build-ios.result }}" >> $GITHUB_STEP_SUMMARY
