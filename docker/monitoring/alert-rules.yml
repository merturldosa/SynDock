groups:
  # ─── API Health ────────────────────────────
  - name: api_health
    rules:
      - alert: ApiDown
        expr: up{job="shop-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Shop API is down"
          description: "Shop API has been unreachable for more than 1 minute."

      - alert: HighErrorRate
        expr: |
          (
            sum(rate(http_requests_received_total{code=~"5.."}[5m]))
            /
            sum(rate(http_requests_received_total[5m]))
          ) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate (>5%)"
          description: "API error rate is {{ $value | humanizePercentage }} over the last 5 minutes."

      - alert: SlowResponseTime
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket{job="shop-api"}[5m])) by (le)
          ) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Slow response time (p95 > 2s)"
          description: "95th percentile response time is {{ $value }}s."

  # ─── Business Metrics ──────────────────────
  - name: business_metrics
    rules:
      - alert: NoOrdersReceived
        expr: |
          sum(increase(shop_orders_created_total[30m])) == 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "No orders received in 30 minutes"
          description: "No new orders have been created in the last 30 minutes during business hours."

      - alert: HighPaymentFailureRate
        expr: |
          (
            sum(rate(shop_payments_failed_total[15m]))
            /
            (sum(rate(shop_payments_completed_total[15m])) + sum(rate(shop_payments_failed_total[15m])))
          ) > 0.1
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "High payment failure rate (>10%)"
          description: "Payment failure rate is {{ $value | humanizePercentage }}."

  # ─── Infrastructure ────────────────────────
  - name: infrastructure
    rules:
      - alert: PostgresDown
        expr: up{job="postgres"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is down"
          description: "PostgreSQL exporter has been unreachable for more than 1 minute."

      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
          description: "Redis exporter has been unreachable for more than 1 minute."

      - alert: HighDbConnections
        expr: pg_stat_activity_count > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High DB connection count (>80)"
          description: "PostgreSQL active connections: {{ $value }}."

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage (>90%)"
          description: "Server memory usage is {{ $value | humanizePercentage }}."

      - alert: HighDiskUsage
        expr: (1 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})) > 0.85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High disk usage (>85%)"
          description: "Disk usage is {{ $value | humanizePercentage }}."
