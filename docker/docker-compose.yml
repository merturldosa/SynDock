version: '3.8'

services:
  shop-db:
    image: postgres:16-alpine
    container_name: syndock-shop-db
    ports:
      - "127.0.0.1:5434:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - shop-db-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  shop-redis:
    image: redis:7-alpine
    container_name: syndock-shop-redis
    ports:
      - "127.0.0.1:6381:6379"
    command: redis-server --appendonly yes
    volumes:
      - shop-redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  shop-api:
    build:
      context: ../
      dockerfile: api/Dockerfile
    container_name: syndock-shop-api
    ports:
      - "5100:5100"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__ShopDb: "Host=shop-db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__Redis: "shop-redis:6379"
      Jwt__Secret: "${JWT_SECRET}"
      Jwt__Issuer: "${JWT_ISSUER}"
      Jwt__Audience: "${JWT_AUDIENCE}"
      Cors__AllowedOrigins__0: "${CORS_ORIGIN_0}"
      Cors__AllowedOrigins__1: "${CORS_ORIGIN_1}"
      Cors__AllowedOrigins__2: "${CORS_ORIGIN_2}"
    depends_on:
      shop-db:
        condition: service_healthy
      shop-redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5100/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  shop-db-data:
  shop-redis-data:

networks:
  default:
    name: syndock-shop-network
